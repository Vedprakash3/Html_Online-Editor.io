<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Online Editor</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    padding:15px;
}

.container{
    max-width:1000px;
    margin:auto;
}

h2{
    text-align:center;
    margin-bottom:15px;
}

textarea{
    width:100%;
    height:250px;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    resize:vertical;
    font-size:15px;
    outline:none;
}

button{
    width:100%;
    margin-top:10px;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#007bff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:active{
    transform:scale(0.98);
}

.preview-box{
    margin-top:15px;
}

iframe{
    width:100%;
    height:400px;
    border:1px solid #ccc;
    border-radius:8px;
    background:white;
}

@media (max-width:600px){
    textarea{
        height:200px;
    }

    iframe{
        height:300px;
    }

    button{
        font-size:15px;
    }
}
</style>
</head>
<body>

<div class="container">

    <h2>HTML Online Editor</h2>

    <textarea id="code" placeholder="Yahan HTML code paste karo..."></textarea>

    <button onclick="runCode()">Run Code</button>

    <div class="preview-box">
        <iframe id="output"></iframe>
    </div>

</div>

<script>
function runCode(){
    const code = document.getElementById("code").value;
    document.getElementById("output").srcdoc = code;
}
</script>

</body>
</html>
