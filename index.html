<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Online Editor</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    padding:15px;
    transition:0.3s;
}

.container{
    max-width:1000px;
    margin:auto;
}

h2{
    text-align:center;
    margin-bottom:15px;
}

textarea{
    width:100%;
    height:250px;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    resize:vertical;
    font-size:15px;
    outline:none;
    transition:0.3s;
}

button{
    width:100%;
    margin-top:10px;
    padding:14px;
    border:none;
    border-radius:8px;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:active{
    transform:scale(0.98);
}

.dark-btn{
    background:#222;
}

.run-btn{
    background:#007bff;
}

.download-btn{
    background:#28a745;
}

.preview-box{
    margin-top:15px;
}

iframe{
    width:100%;
    height:400px;
    border:1px solid #ccc;
    border-radius:8px;
    background:white;
}

@media (max-width:600px){

    textarea{
        height:200px;
    }

    iframe{
        height:300px;
    }

    button{
        font-size:15px;
    }
}

/* Dark Mode */

body.dark{
    background:#121212;
    color:white;
}

body.dark textarea{
    background:#1e1e1e;
    color:white;
    border:1px solid #444;
}

body.dark iframe{
    border:1px solid #444;
}

body.dark h2{
    color:white;
}
</style>
</head>
<body>

<div class="container">

    <h2>HTML Online Editor</h2>

    <button class="dark-btn" onclick="toggleDarkMode()">
        🌙 Toggle Dark Mode
    </button>

    <textarea id="code" placeholder="Yahan HTML code paste karo..."></textarea>

    <button class="run-btn" onclick="runCode()">
        ▶ Run Code
    </button>

    <button class="download-btn" onclick="downloadHTML()">
        ⬇ Download HTML
    </button>

    <div class="preview-box">
        <iframe id="output"></iframe>
    </div>

</div>

<script>

const editor = document.getElementById("code");
const output = document.getElementById("output");

/* Load Saved Code */
editor.value = localStorage.getItem("htmlCode") || "";

/* Auto Save Code */
editor.addEventListener("input", () => {
    localStorage.setItem("htmlCode", editor.value);
});

/* Run Code */
function runCode(){
    output.srcdoc = editor.value;
}

/* Download HTML File */
function downloadHTML(){

    const code = editor.value;

    if(code.trim() === ""){
        alert("Pehle HTML code likho.");
        return;
    }

    const blob = new Blob(
        [code],
        { type: "text/html" }
    );

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "index.html";

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    URL.revokeObjectURL(url);
}

/* Load Theme */
if(localStorage.getItem("theme") === "dark"){
    document.body.classList.add("dark");
}

/* Toggle Dark Mode */
function toggleDarkMode(){

    document.body.classList.toggle("dark");

    if(document.body.classList.contains("dark")){
        localStorage.setItem("theme","dark");
    }else{
        localStorage.setItem("theme","light");
    }
}

/* Auto Run Last Saved Code On Reload */
if(editor.value.trim() !== ""){
    output.srcdoc = editor.value;
}

</script>

</body>
</html>
